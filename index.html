<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evolution OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --bg:#0B0D12;
  --bg-elev:#12151C;
  --bg-elev-2:#1A1E27;
  --text:#EDEAE3;
  --text-dim:#9A9DA6;
  --text-faint:#5C6070;
  --accent:#C9A24B;
  --accent-soft:rgba(201,162,75,0.14);
  --accent-line:rgba(201,162,75,0.35);
  --teal:#4C8377;
  --rust:#B5533C;
  --border:#242833;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background: radial-gradient(ellipse at top, #14161f 0%, #0B0D12 55%);
  color:var(--text);
  font-family:'Inter', sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;
  justify-content:center;
  min-height:100vh;
  padding:24px 12px;
}
::selection{background:var(--accent-soft); color:var(--accent);}
button{font-family:inherit; cursor:pointer;}
input,textarea,select{font-family:inherit; color:var(--text); background:var(--bg-elev-2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; font-size:14px; outline:none;}
input:focus,textarea:focus,select:focus{border-color:var(--accent-line);}
textarea{resize:none;}

.phone{
  width:100%;
  max-width:420px;
  background:var(--bg);
  border:1px solid #1D212B;
  border-radius:32px;
  box-shadow:0 40px 100px -30px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.03);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  height:844px;
  max-height:92vh;
  position:relative;
}
.statusbar{
  height:14px;
}
.screen{
  flex:1;
  overflow-y:auto;
  padding:22px 20px 100px;
  scrollbar-width:none;
}
.screen::-webkit-scrollbar{display:none;}

.eyebrow{
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:8px;
}
.eyebrow::before{content:''; width:14px; height:1px; background:var(--accent); display:inline-block;}
h1.title{
  font-family:'Fraunces', serif;
  font-weight:500;
  font-size:26px;
  line-height:1.15;
  letter-spacing:-0.01em;
  margin-bottom:2px;
}
.sub{color:var(--text-dim); font-size:13.5px; margin-bottom:22px;}

/* --- Bottom nav --- */
.nav{
  position:absolute;
  bottom:0; left:0; right:0;
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:10px 8px calc(env(safe-area-inset-bottom,0px) + 10px);
  background:rgba(18,21,28,0.88);
  backdrop-filter:blur(14px);
  border-top:1px solid var(--border);
}
.nav-item{
  display:flex; flex-direction:column; align-items:center; gap:4px;
  background:none; border:none; color:var(--text-faint);
  font-size:9.5px; font-family:'IBM Plex Mono',monospace; letter-spacing:0.04em;
  padding:4px 6px; border-radius:10px; transition:color .2s;
}
.nav-item svg{width:19px; height:19px; stroke:var(--text-faint); fill:none; stroke-width:1.6; transition:stroke .2s;}
.nav-item.active{color:var(--accent);}
.nav-item.active svg{stroke:var(--accent);}

/* --- Cards --- */
.card{
  background:var(--bg-elev);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px 16px;
  margin-bottom:12px;
}
.card-row{display:flex; justify-content:space-between; align-items:center;}
.label{font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.08em; font-family:'IBM Plex Mono',monospace;}
.value-lg{font-family:'Fraunces',serif; font-size:22px; font-weight:500;}

/* --- Dial (signature element) --- */
.dial-wrap{display:flex; align-items:center; gap:18px;}
.dial-num{font-family:'Fraunces',serif; font-size:30px; font-weight:500; fill:var(--text);}
.dial-caption{font-family:'IBM Plex Mono',monospace; font-size:9px; fill:var(--text-faint); letter-spacing:0.06em;}

/* --- Victory input --- */
.victory-box textarea{width:100%; min-height:54px; font-size:14.5px; line-height:1.4;}
.victory-box{padding:16px; background:linear-gradient(160deg, var(--accent-soft), transparent 70%); border:1px solid var(--accent-line);}
.victory-box .eyebrow{color:var(--accent);}

/* --- Mini stat grid --- */
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.stat-card{background:var(--bg-elev); border:1px solid var(--border); border-radius:14px; padding:13px 14px;}
.stat-card .n{font-family:'Fraunces',serif; font-size:20px;}
.stat-card .l{font-size:11px; color:var(--text-dim); margin-top:2px;}

/* --- Habit row --- */
.habit{display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--border);}
.habit:last-child{border-bottom:none;}
.check{
  width:26px; height:26px; border-radius:8px; border:1.5px solid var(--border);
  display:flex; align-items:center; justify-content:center; flex-shrink:0; background:var(--bg-elev-2);
  transition:all .15s;
}
.check.done{background:var(--accent); border-color:var(--accent);}
.check svg{width:14px; height:14px; stroke:var(--bg); stroke-width:3; fill:none; opacity:0;}
.check.done svg{opacity:1;}
.habit-name{flex:1; font-size:14.5px;}
.habit-streak{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent);}
.del-btn{background:none; border:none; color:var(--text-faint); font-size:16px; padding:0 2px;}

.add-row{display:flex; gap:8px; margin-top:12px;}
.add-row input{flex:1;}
.btn{
  background:var(--accent); color:#1A1204; border:none; border-radius:10px;
  padding:10px 16px; font-weight:600; font-size:13.5px; white-space:nowrap;
}
.btn.ghost{background:none; border:1px solid var(--border); color:var(--text);}
.btn.small{padding:7px 12px; font-size:12.5px;}
.btn.block{width:100%; padding:12px; margin-top:10px;}

/* Journal */
.journal-entry{border-bottom:1px solid var(--border); padding:14px 0;}
.journal-entry:last-child{border-bottom:none;}
.journal-date{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--text-faint); display:flex; justify-content:space-between;}
.mood-pill{font-size:10px; padding:2px 8px; border-radius:20px; background:var(--bg-elev-2); border:1px solid var(--border);}
.journal-text{font-size:14px; line-height:1.55; margin-top:6px; color:var(--text);}

/* Goals */
.goal{margin-bottom:16px;}
.goal-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;}
.goal-name{font-size:14.5px; font-weight:500;}
.goal-cat{font-size:10px; color:var(--text-faint); font-family:'IBM Plex Mono',monospace;}
.bar-bg{height:7px; background:var(--bg-elev-2); border-radius:5px; overflow:hidden;}
.bar-fill{height:100%; background:linear-gradient(90deg, var(--teal), var(--accent)); border-radius:5px; transition:width .4s;}
.goal-pct{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text-dim); margin-top:4px;}

/* Insights */
.insight{display:flex; gap:12px; padding:14px 0; border-bottom:1px solid var(--border);}
.insight:last-child{border-bottom:none;}
.insight-dot{width:7px; height:7px; border-radius:50%; background:var(--accent); margin-top:6px; flex-shrink:0;}
.insight-text{font-size:13.5px; line-height:1.5; color:var(--text);}
.insight-text b{color:var(--accent); font-weight:600;}

.empty{color:var(--text-faint); font-size:13px; text-align:center; padding:30px 10px; line-height:1.6;}

.timeline-item{display:flex; gap:12px; padding-bottom:18px; position:relative;}
.timeline-item:not(:last-child)::before{content:''; position:absolute; left:5px; top:16px; bottom:-2px; width:1px; background:var(--border);}
.t-dot{width:11px; height:11px; border-radius:50%; border:2px solid var(--accent); background:var(--bg); flex-shrink:0; margin-top:2px;}
.t-date{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--text-faint);}
.t-title{font-size:14px; margin-top:2px;}

.section-gap{margin-top:26px;}
.tag-row{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;}
.tag{font-size:11px; padding:5px 10px; border-radius:20px; border:1px solid var(--border); color:var(--text-dim); background:var(--bg-elev-2);}
.tag.sel{border-color:var(--accent-line); color:var(--accent); background:var(--accent-soft);}
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="screen" id="screen"></div>
  <div class="nav" id="nav">
    <button class="nav-item" data-tab="hoje">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      HOJE
    </button>
    <button class="nav-item" data-tab="habitos">
      <svg viewBox="0 0 24 24"><path d="M5 12l4 4 10-10"/></svg>
      HÁBITOS
    </button>
    <button class="nav-item" data-tab="diario">
      <svg viewBox="0 0 24 24"><path d="M4 4h13a3 3 0 013 3v13H7a3 3 0 01-3-3V4z"/><path d="M4 4v13a3 3 0 003 3"/></svg>
      DIÁRIO
    </button>
    <button class="nav-item" data-tab="metas">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="0.8" fill="currentColor"/></svg>
      METAS
    </button>
    <button class="nav-item" data-tab="insights">
      <svg viewBox="0 0 24 24"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M6 6l2 2M16 16l2 2M6 18l2-2M16 8l2-2"/><circle cx="12" cy="12" r="3.5"/></svg>
      INSIGHTS
    </button>
  </div>
</div>

<script>
/* ---------- Estado ---------- */
let state = null;
const todayKey = () => new Date().toISOString().slice(0,10);
const WEEKDAYS = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

function defaultState(){
  return {
    habits: [
      {id:cid(), name:'Deep Work (90min)', completedDates:[]},
      {id:cid(), name:'Treino', completedDates:[]},
      {id:cid(), name:'Leitura (20min)', completedDates:[]}
    ],
    journal: [],
    goals: [
      {id:cid(), name:'Lançar novo produto', cat:'negócio', progress:35},
      {id:cid(), name:'Correr 10km sem parar', cat:'pessoal', progress:60}
    ],
    timeline: [],
    dailyLogs: {} // { '2026-07-12': {sleep:7.5, energy:'alta', victory:'...', victoryDone:false} }
  };
}
function cid(){ return Math.random().toString(36).slice(2,9); }

async function loadState(){
  try{
    const res = await window.storage.get('app-state', false);
    state = res ? JSON.parse(res.value) : defaultState();
  }catch(e){
    state = defaultState();
  }
  if(!state.dailyLogs) state.dailyLogs = {};
  render();
}
async function save(){
  try{ await window.storage.set('app-state', JSON.stringify(state), false); }
  catch(e){ console.error('Erro ao guardar', e); }
}
function today(){
  const k = todayKey();
  if(!state.dailyLogs[k]) state.dailyLogs[k] = {sleep:null, energy:null, victory:'', victoryDone:false};
  return state.dailyLogs[k];
}

/* ---------- Navegação ---------- */
let activeTab = 'hoje';
document.getElementById('nav').addEventListener('click', e=>{
  const btn = e.target.closest('.nav-item');
  if(!btn) return;
  activeTab = btn.dataset.tab;
  render();
});

function render(){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active', b.dataset.tab===activeTab));
  const screen = document.getElementById('screen');
  screen.innerHTML = {
    hoje: renderHoje,
    habitos: renderHabitos,
    diario: renderDiario,
    metas: renderMetas,
    insights: renderInsights
  }[activeTab]();
  attachHandlers();
  screen.scrollTop = 0;
}

/* ---------- Cálculo da pontuação de identidade ---------- */
function identityScore(){
  const log = today();
  const total = state.habits.length;
  const done = state.habits.filter(h=>h.completedDates.includes(todayKey())).length;
  const habitFrac = total ? done/total : 0;
  let score = habitFrac*0.55;
  if(log.victoryDone) score += 0.25;
  const journaledToday = state.journal.some(j=>j.date===todayKey());
  if(journaledToday) score += 0.20;
  return Math.round(score*100);
}

function dialSVG(pct){
  const r = 46, c = 2*Math.PI*r;
  const offset = c - (pct/100)*c;
  return `
  <svg width="120" height="120" viewBox="0 0 120 120">
    <circle cx="60" cy="60" r="${r}" fill="none" stroke="#1A1E27" stroke-width="9"/>
    <circle cx="60" cy="60" r="${r}" fill="none" stroke="url(#g)" stroke-width="9" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}" transform="rotate(-90 60 60)"/>
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4C8377"/><stop offset="100%" stop-color="#C9A24B"/>
    </linearGradient></defs>
    <text x="60" y="56" text-anchor="middle" class="dial-num">${pct}%</text>
    <text x="60" y="74" text-anchor="middle" class="dial-caption">IDENTIDADE</text>
  </svg>`;
}

/* ---------- HOJE ---------- */
function renderHoje(){
  const d = new Date();
  const log = today();
  const hour = d.getHours();
  const greet = hour<12?'Bom dia.':hour<19?'Boa tarde.':'Boa noite.';
  const doneHabits = state.habits.filter(h=>h.completedDates.includes(todayKey())).length;

  return `
    <div class="eyebrow">${WEEKDAYS[d.getDay()]} · ${d.toLocaleDateString('pt-PT',{day:'2-digit',month:'long'})}</div>
    <h1 class="title">${greet}</h1>
    <div class="sub">O sistema está a observar. Vamos começar bem o dia.</div>

    <div class="card">
      <div class="dial-wrap">
        ${dialSVG(identityScore())}
        <div style="flex:1;">
          <div class="label">Sono desta noite</div>
          <input type="number" step="0.5" min="0" max="14" id="sleepInput" placeholder="ex: 7.5" value="${log.sleep ?? ''}" style="width:90px; margin:6px 0 10px;">
          <div class="label">Energia prevista</div>
          <div class="tag-row" id="energyTags">
            ${['baixa','média','alta'].map(e=>`<span class="tag ${log.energy===e?'sel':''}" data-energy="${e}">${e}</span>`).join('')}
          </div>
        </div>
      </div>
    </div>

    <div class="card victory-box">
      <div class="eyebrow">A vitória de hoje</div>
      <div class="sub" style="margin-bottom:8px;">Qual é a única coisa que tornaria este dia um sucesso?</div>
      <textarea id="victoryInput" placeholder="Escreve a tua vitória do dia...">${log.victory||''}</textarea>
      <button class="btn small ${log.victoryDone?'':'ghost'}" id="victoryToggle" style="margin-top:10px;">
        ${log.victoryDone ? '✓ Concluída' : 'Marcar como concluída'}
      </button>
    </div>

    <div class="grid2 section-gap">
      <div class="stat-card"><div class="n">${doneHabits}/${state.habits.length}</div><div class="l">Hábitos hoje</div></div>
      <div class="stat-card"><div class="n">${currentStreakOverall()}</div><div class="l">Dias seguidos ativo</div></div>
      <div class="stat-card"><div class="n">${state.journal.length}</div><div class="l">Entradas no diário</div></div>
      <div class="stat-card"><div class="n">${avgProgress()}%</div><div class="l">Progresso médio nas metas</div></div>
    </div>
  `;
}

function currentStreakOverall(){
  let streak = 0;
  let d = new Date();
  while(true){
    const k = d.toISOString().slice(0,10);
    const anyDone = state.habits.some(h=>h.completedDates.includes(k)) || state.journal.some(j=>j.date===k);
    if(anyDone){ streak++; d.setDate(d.getDate()-1); } else break;
    if(streak>365) break;
  }
  return streak;
}
function avgProgress(){
  if(!state.goals.length) return 0;
  return Math.round(state.goals.reduce((s,g)=>s+g.progress,0)/state.goals.length);
}

/* ---------- HÁBITOS ---------- */
function renderHabitos(){
  return `
    <div class="eyebrow">Sistemas, não motivação</div>
    <h1 class="title">Hábitos</h1>
    <div class="sub">Cada marca é um voto na identidade que queres construir.</div>
    <div class="card">
      ${state.habits.length ? state.habits.map(h=>{
        const done = h.completedDates.includes(todayKey());
        return `
        <div class="habit">
          <button class="check ${done?'done':''}" data-habit="${h.id}">
            <svg viewBox="0 0 24 24"><path d="M5 12l4 4 10-10"/></svg>
          </button>
          <div class="habit-name">${h.name}</div>
          <div class="habit-streak">${habitStreak(h)}d</div>
          <button class="del-btn" data-del-habit="${h.id}">✕</button>
        </div>`;
      }).join('') : `<div class="empty">Ainda não tens hábitos.<br>Adiciona o primeiro abaixo.</div>`}
      <div class="add-row">
        <input id="newHabit" placeholder="Novo hábito...">
        <button class="btn" id="addHabitBtn">Adicionar</button>
      </div>
    </div>
  `;
}
function habitStreak(h){
  let streak=0, d=new Date();
  while(true){
    const k=d.toISOString().slice(0,10);
    if(h.completedDates.includes(k)){ streak++; d.setDate(d.getDate()-1);} else break;
    if(streak>365) break;
  }
  return streak;
}

/* ---------- DIÁRIO ---------- */
function renderDiario(){
  const sorted = [...state.journal].sort((a,b)=>b.date.localeCompare(a.date));
  return `
    <div class="eyebrow">Uma conversa contigo próprio</div>
    <h1 class="title">Diário</h1>
    <div class="sub">O que aconteceu hoje que vale a pena lembrar?</div>
    <div class="card">
      <textarea id="journalInput" placeholder="Escreve livremente..." style="min-height:80px; width:100%;"></textarea>
      <div class="tag-row" id="moodTags">
        ${['🔥 forte','🙂 estável','😐 neutro','😔 em baixo','😤 frustrado'].map(m=>`<span class="tag" data-mood="${m}">${m}</span>`).join('')}
      </div>
      <button class="btn block" id="addJournalBtn">Guardar entrada</button>
    </div>
    <div class="card section-gap">
      ${sorted.length ? sorted.map(j=>`
        <div class="journal-entry">
          <div class="journal-date"><span>${fmtDate(j.date)}</span>${j.mood?`<span class="mood-pill">${j.mood}</span>`:''}</div>
          <div class="journal-text">${escapeHtml(j.text)}</div>
        </div>
      `).join('') : `<div class="empty">Sem entradas ainda.<br>O que escreveres aqui ensina o sistema a conhecer-te.</div>`}
    </div>
  `;
}
function fmtDate(k){
  const d = new Date(k+'T00:00:00');
  return d.toLocaleDateString('pt-PT',{day:'2-digit',month:'short',year:'numeric'});
}
function escapeHtml(s){
  const div = document.createElement('div'); div.textContent = s; return div.innerHTML;
}

/* ---------- METAS ---------- */
function renderMetas(){
  return `
    <div class="eyebrow">Nada existe sem propósito</div>
    <h1 class="title">Metas & Negócio</h1>
    <div class="sub">Cada objetivo pertence a uma visão maior.</div>
    <div class="card">
      ${state.goals.length ? state.goals.map(g=>`
        <div class="goal">
          <div class="goal-top">
            <div>
              <div class="goal-name">${escapeHtml(g.name)}</div>
              <div class="goal-cat">${g.cat.toUpperCase()}</div>
            </div>
            <button class="del-btn" data-del-goal="${g.id}">✕</button>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${g.progress}%"></div></div>
          <div class="goal-pct">
            <input type="range" min="0" max="100" value="${g.progress}" data-goal-slider="${g.id}" style="width:60%; vertical-align:middle;">
            ${g.progress}%
          </div>
        </div>
      `).join('') : `<div class="empty">Sem metas definidas.</div>`}
      <div class="add-row" style="flex-wrap:wrap;">
        <input id="newGoal" placeholder="Nova meta..." style="flex:1 1 100%; margin-bottom:8px;">
        <select id="newGoalCat" style="flex:1;">
          <option value="pessoal">Pessoal</option>
          <option value="negócio">Negócio</option>
        </select>
        <button class="btn" id="addGoalBtn">Adicionar</button>
      </div>
    </div>

    <div class="section-gap eyebrow">Linha temporal</div>
    <div class="card">
      ${state.timeline.length ? [...state.timeline].sort((a,b)=>b.date.localeCompare(a.date)).map(t=>`
        <div class="timeline-item">
          <div class="t-dot"></div>
          <div>
            <div class="t-date">${fmtDate(t.date)}</div>
            <div class="t-title">${escapeHtml(t.title)}</div>
          </div>
        </div>
      `).join('') : `<div class="empty">Marcos importantes vão aparecer aqui.</div>`}
      <div class="add-row">
        <input id="newTimeline" placeholder="Marco importante...">
        <button class="btn" id="addTimelineBtn">+</button>
      </div>
    </div>
  `;
}

/* ---------- INSIGHTS ---------- */
function computeInsights(){
  const out = [];
  // streak
  const s = currentStreakOverall();
  if(s>=3) out.push(`Estás há <b>${s} dias</b> seguidos com alguma forma de progresso registado. É assim que se constrói identidade.`);

  // hábito mais consistente
  if(state.habits.length){
    const best = state.habits.reduce((a,b)=> habitStreak(b)>habitStreak(a)?b:a, state.habits[0]);
    if(habitStreak(best)>0) out.push(`<b>${escapeHtml(best.name)}</b> é o teu hábito mais consistente, com uma sequência de ${habitStreak(best)} dia(s).`);
  }

  // sono vs hábitos concluídos
  const logs = Object.entries(state.dailyLogs).filter(([k,v])=>v.sleep!=null);
  if(logs.length>=3){
    const highSleep = logs.filter(([k,v])=>v.sleep>=7);
    const lowSleep = logs.filter(([k,v])=>v.sleep<7);
    const completionOn = (arr) => {
      if(!arr.length) return null;
      const total = arr.reduce((sum,[k])=> sum + state.habits.filter(h=>h.completedDates.includes(k)).length, 0);
      return (total/(arr.length*(state.habits.length||1))*100);
    };
    const hc = completionOn(highSleep), lc = completionOn(lowSleep);
    if(hc!=null && lc!=null && Math.abs(hc-lc)>10){
      out.push(hc>lc
        ? `Nos dias em que dormiste <b>7h ou mais</b>, concluíste ${Math.round(hc-lc)}% mais hábitos do que nos dias com menos sono.`
        : `Curiosamente, dormir menos não reduziu a tua conclusão de hábitos — vale a pena continuar a observar este padrão.`);
    }
  }

  // frequência do diário
  if(state.journal.length>=2){
    out.push(`Já escreveste <b>${state.journal.length} entradas</b> no diário. Cada uma ensina o sistema a compreender melhor os teus padrões.`);
  }

  // metas perto da conclusão
  const near = state.goals.filter(g=>g.progress>=80 && g.progress<100);
  if(near.length) out.push(`<b>${escapeHtml(near[0].name)}</b> está a ${near[0].progress}% — muito perto da conclusão.`);

  // metas estagnadas
  const stuck = state.goals.filter(g=>g.progress<10);
  if(stuck.length) out.push(`<b>${escapeHtml(stuck[0].name)}</b> ainda está no início. Talvez precise de ser dividida em passos mais pequenos.`);

  if(!out.length) out.push('Regista alguns dias de hábitos, sono e diário para o sistema começar a encontrar padrões reais.');
  return out;
}

function renderInsights(){
  const insights = computeInsights();
  return `
    <div class="eyebrow">Conclusões, não opiniões</div>
    <h1 class="title">Insights</h1>
    <div class="sub">Baseado exclusivamente nos teus próprios dados.</div>
    <div class="card">
      ${insights.map(i=>`<div class="insight"><div class="insight-dot"></div><div class="insight-text">${i}</div></div>`).join('')}
    </div>
  `;
}

/* ---------- Handlers ---------- */
function attachHandlers(){
  // Hoje
  const sleepInput = document.getElementById('sleepInput');
  if(sleepInput) sleepInput.addEventListener('change', e=>{
    today().sleep = e.target.value ? parseFloat(e.target.value) : null;
    save();
  });
  const energyTags = document.getElementById('energyTags');
  if(energyTags) energyTags.addEventListener('click', e=>{
    const t = e.target.closest('[data-energy]'); if(!t) return;
    today().energy = t.dataset.energy;
    save(); render();
  });
  const victoryInput = document.getElementById('victoryInput');
  if(victoryInput) victoryInput.addEventListener('change', e=>{
    today().victory = e.target.value; save();
  });
  const victoryToggle = document.getElementById('victoryToggle');
  if(victoryToggle) victoryToggle.addEventListener('click', ()=>{
    today().victoryDone = !today().victoryDone; save(); render();
  });

  // Hábitos
  document.querySelectorAll('[data-habit]').forEach(b=>b.addEventListener('click', ()=>{
    const h = state.habits.find(x=>x.id===b.dataset.habit);
    const k = todayKey();
    const idx = h.completedDates.indexOf(k);
    if(idx>=0) h.completedDates.splice(idx,1); else h.completedDates.push(k);
    save(); render();
  }));
  document.querySelectorAll('[data-del-habit]').forEach(b=>b.addEventListener('click', ()=>{
    state.habits = state.habits.filter(h=>h.id!==b.dataset.delHabit);
    save(); render();
  }));
  const addHabitBtn = document.getElementById('addHabitBtn');
  if(addHabitBtn) addHabitBtn.addEventListener('click', ()=>{
    const inp = document.getElementById('newHabit');
    if(inp.value.trim()){
      state.habits.push({id:cid(), name:inp.value.trim(), completedDates:[]});
      save(); render();
    }
  });

  // Diário
  let selectedMood = '';
  const moodTags = document.getElementById('moodTags');
  if(moodTags) moodTags.addEventListener('click', e=>{
    const t = e.target.closest('[data-mood]'); if(!t) return;
    selectedMood = t.dataset.mood;
    moodTags.querySelectorAll('.tag').forEach(x=>x.classList.toggle('sel', x===t));
  });
  const addJournalBtn = document.getElementById('addJournalBtn');
  if(addJournalBtn) addJournalBtn.addEventListener('click', ()=>{
    const inp = document.getElementById('journalInput');
    if(inp.value.trim()){
      state.journal.push({id:cid(), date:todayKey(), text:inp.value.trim(), mood:selectedMood});
      save(); render();
    }
  });

  // Metas
  document.querySelectorAll('[data-goal-slider]').forEach(s=>s.addEventListener('input', e=>{
    const g = state.goals.find(x=>x.id===s.dataset.goalSlider);
    g.progress = parseInt(e.target.value);
    e.target.closest('.goal').querySelector('.bar-fill').style.width = g.progress+'%';
    e.target.closest('.goal').querySelector('.goal-pct').lastChild.textContent = ' '+g.progress+'%';
  }));
  document.querySelectorAll('[data-goal-slider]').forEach(s=>s.addEventListener('change', save));
  document.querySelectorAll('[data-del-goal]').forEach(b=>b.addEventListener('click', ()=>{
    state.goals = state.goals.filter(g=>g.id!==b.dataset.delGoal);
    save(); render();
  }));
  const addGoalBtn = document.getElementById('addGoalBtn');
  if(addGoalBtn) addGoalBtn.addEventListener('click', ()=>{
    const inp = document.getElementById('newGoal');
    const cat = document.getElementById('newGoalCat').value;
    if(inp.value.trim()){
      state.goals.push({id:cid(), name:inp.value.trim(), cat, progress:0});
      save(); render();
    }
  });
  const addTimelineBtn = document.getElementById('addTimelineBtn');
  if(addTimelineBtn) addTimelineBtn.addEventListener('click', ()=>{
    const inp = document.getElementById('newTimeline');
    if(inp.value.trim()){
      state.timeline.push({id:cid(), date:todayKey(), title:inp.value.trim()});
      save(); render();
    }
  });
}

loadState();
</script>
